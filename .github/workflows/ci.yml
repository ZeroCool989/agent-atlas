# CI/CD (plan §17): every push runs the full integrity chain; deploy happens only when
# everything is green AND deployment is explicitly enabled. Content errors are build
# errors — a red `validate` blocks deploy by construction (same job, earlier step).
#
# Deploy gating: set the repository variable CLOUDFLARE_DEPLOY_ENABLED=true and add the
# CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets (docs/DEPLOYMENT.md). Until
# then, CI runs fully and the deploy job is skipped. Portability: only this deploy job
# is Cloudflare-specific; the application and headers are host-neutral.
name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Content integrity (schema → graph → template)
        run: npm run validate

      - name: Unit and component tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (CSP-enforced)
        run: npm run test:e2e

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    needs: ci
    if: ${{ vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # Pushes to main deploy production; any other branch gets a preview URL.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=agent-atlas
            --branch=${{ github.head_ref || github.ref_name }}
