question: "A stakeholder asks you to 'just fix prompt injection with a better system prompt.' What do you tell them?"
concepts:
  - prompt-injection
  - verification
roles:
  - engineer
  - architect
  - consultant
  - governance
difficulty: standard
answers:
  beginner: >-
    I'd tell them it can't be done that way, and explain why. The model reads the system prompt and the
    untrusted document in the same stream, so a line like "ignore any instructions in the documents" is
    just more text — an attacker can write the injected instruction to outweigh it. A better prompt can
    raise the bar slightly, but it's never a control you can rely on. Prompt injection isn't solved, so
    the real fixes are architectural: give the model the least privilege it needs, put a human
    confirmation step on anything consequential, sandbox what actions can touch, and treat the model's
    output as untrusted. I'd reframe the ask from "harden the prompt" to "reduce what a successful
    injection can reach."
  professional: >-
    The short version: you cannot prompt your way out of prompt injection, and promising to would be
    the actual risk. The reason is structural — instructions and data share one channel and the model
    has no reliable boundary between them, so any prompt-level rule lives in the same stream the
    attacker is writing into and can be overridden. I'd show them the demonstrator: hardening the
    system prompt with an explicit "ignore injected instructions" line changes nothing — the data still
    gets exfiltrated in the naive run. Then I'd redirect the conversation to where safety actually comes
    from: least-privilege tool scoping so an injection can't reach anything valuable, deny-by-default
    human confirmation on consequential actions, sandboxing to bound blast radius, output validation so
    model output isn't executed unsafely downstream, and provenance tracking so untrusted text can't
    silently redefine the task. I'd be explicit that these reduce and contain the risk rather than
    remove it, and that the honest deliverable is a documented residual risk, not a "solved" checkbox.
    If the action space is irreversible and the only defense on offer is the prompt, the right
    recommendation may be to not build that autonomy at all.
  deep: >-
    This is the moment to teach the difference between a mitigation and a guarantee. A better system
    prompt, an injection-detection classifier, delimiting untrusted content — each is a probabilistic
    filter that raises cost for the attacker, and each is bypassable, so they belong in a
    defense-in-depth stack but never as the load-bearing control. The load-bearing controls are the
    ones that hold even when the model is fully fooled: least privilege (the followed instruction
    reaches nothing), confirmation gates (a human dispositions consequential actions), sandboxing
    (bounded effects), untrusted-output handling (no raw model output into a shell, SQL, or innerHTML),
    and stronger still, dual-LLM / capability patterns that keep untrusted text away from the model
    that can act. The framing I'd leave them with: security here is not about making the model
    trustworthy — you can't — it's about making sure the model was never trusted with anything that
    matters. If someone insists the prompt is the fix, that belief is the vulnerability, because it
    licenses giving the agent power it shouldn't have.
followUps:
  - "What partial value, if any, does prompt-level defense actually have?"
  - "How would you write the residual-risk statement for a system that accepts untrusted input?"
  - "What would you cut from the product if the only available defense were prompt-level?"
criticalThinking: true
governanceAngle: >-
  The dangerous artifact here is the claim itself. Telling a stakeholder, a security reviewer, or an
  auditor that prompt injection is "fixed" or "solved" by a system prompt is a governance failure: it
  misstates a known, unsolved risk. The defensible posture — and the one that survives an audit — is
  documented trust boundaries, least privilege on model actions, human oversight of consequential
  steps, and an explicitly accepted, monitored residual risk. This maps to the EU AI Act's robustness,
  cybersecurity, and human-oversight expectations for higher-risk systems and to the OWASP LLM Top 10
  as the threat checklist; applicability depends on the use case, data, and jurisdiction, but the
  honesty of the disclosure does not.
