decisions: >-
  Industry-canonical statement of the workflow/agent distinction (workflows
  orchestrate models through predefined code paths; agents dynamically direct their
  own processes) and of the "start simple, add autonomy only when needed" guidance.
  Routed to: workflows-vs-agents — grounds the definition and the climb-the-ladder-
  downward recommendation. Also routed to: prompt-engineering — its "augmented LLM"
  base case and "start with the simplest thing (a good prompt), add machinery only
  when it demonstrably helps" thesis grounds the concept's framing that prompting is
  the first lever, not the only one. Creates no new concept; contradicts nothing.
  Interview contribution: the "is tool calling alone an agent?" follow-up mirrors its
  taxonomy. Visualization note: its augmented-LLM/workflow/agent diagrams corroborate
  the four-architecture comparison built for the lesson.
